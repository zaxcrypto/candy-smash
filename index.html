<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Candy Slash – Match 3 Puzzle</title>
  <meta name="description" content="Candy Slash – A stunning match-3 puzzle game with custom tiles, level progression, and satisfying combos." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════════
       SCREEN 1 – USERNAME / WELCOME
  ══════════════════════════════════════════════ -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-bg-blobs">
      <div class="blob blob1"></div>
      <div class="blob blob2"></div>
      <div class="blob blob3"></div>
    </div>
    <div class="welcome-card glass">
      <div class="logo-wrap">
        <div class="logo-icon">🍬</div>
        <h1 class="logo-title">Candy Slash</h1>
        <p class="logo-sub">Match · Blast · Conquer</p>
      </div>
      <div class="input-group">
        <label for="username-input">Your Name</label>
        <input id="username-input" type="text" placeholder="Enter username…" maxlength="20" autocomplete="off" />
      </div>
      <button id="btn-start" class="btn btn-primary" onclick="startGame()">
        <span>Start Game</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN 2 – GAMEPLAY
  ══════════════════════════════════════════════ -->
  <div id="screen-game" class="screen">

    <!-- Top HUD -->
    <header class="hud glass">
      <div class="hud-block">
        <span class="hud-label">Level</span>
        <span class="hud-value" id="hud-level">1</span>
      </div>
      <div class="hud-block center">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="hud-score">0</span>
        <div class="target-bar-wrap">
          <div class="target-bar-track">
            <div class="target-bar-fill" id="target-bar-fill"></div>
          </div>
          <span class="target-label">Target: <span id="hud-target">10</span></span>
        </div>
      </div>
      <div class="hud-block right">
        <span class="hud-label">Moves</span>
        <span class="hud-value" id="hud-moves">30</span>
        <button class="settings-btn" id="btn-settings" aria-label="Settings" onclick="openSettings()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Player info bar -->
    <div class="player-bar">
      <span class="player-avatar">👤</span>
      <span id="player-name-display">Player</span>
    </div>

    <!-- Board -->
    <main class="board-wrap">
      <div id="game-board" class="board"></div>
      <div id="combo-toast" class="combo-toast"></div>
    </main>

  </div>

  <!-- ══════════════════════════════════════════════
       MODALS
  ══════════════════════════════════════════════ -->

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal-overlay hidden" onclick="closeSettings(event)">
    <div class="modal glass">
      <h2>Settings</h2>
      <div class="modal-player-info">
        <span class="player-avatar lg">👤</span>
        <span id="modal-username"></span>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="resumeGame()">▶ Resume</button>
        <button class="btn btn-secondary" onclick="restartLevel()">↺ Restart Level</button>
        <button class="btn btn-danger" onclick="goHome()">⌂ Home</button>
      </div>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
  </div>

  <!-- Level Complete Modal -->
  <div id="modal-win" class="modal-overlay hidden">
    <div class="modal glass win-modal">
      <div class="win-stars" id="win-stars">⭐⭐⭐</div>
      <h2 class="win-title">Level Complete!</h2>
      <p class="win-sub" id="win-sub-text"></p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-next-level" onclick="nextLevel()">Next Level →</button>
        <button class="btn btn-secondary" onclick="restartLevel()">Play Again</button>
      </div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="modal-lose" class="modal-overlay hidden">
    <div class="modal glass">
      <div class="lose-icon">💔</div>
      <h2>Out of Moves!</h2>
      <p id="lose-sub-text" class="lose-sub"></p>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="restartLevel()">↺ Try Again</button>
        <button class="btn btn-secondary" onclick="goHome()">⌂ Home</button>
      </div>
    </div>
  </div>

  <!-- All Levels Complete Modal -->
  <div id="modal-complete" class="modal-overlay hidden">
    <div class="modal glass win-modal">
      <div class="win-stars">🏆</div>
      <h2 class="win-title">You Won!</h2>
      <p>All 30 levels conquered. You are a Candy Slash master!</p>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="goHome()">Play Again</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
